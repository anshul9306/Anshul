<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crowd Collector Battle</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; touch-action:pan-x; user-select:none; }
#gameCanvas { display:block; width:100vw; height:100vh; touch-action:none; position:relative; z-index:1; }

#hud {
  position:fixed; top:0; left:0; right:0; pointer-events:none;
  padding:16px 16px 0; z-index:10; display:flex; justify-content:space-between; align-items:flex-start;
}
.pill {
  background:rgba(10,10,20,0.72); backdrop-filter:blur(12px);
  border:1.5px solid rgba(255,255,255,0.14); border-radius:40px;
  padding:8px 16px; display:flex; align-items:center; gap:8px;
}
.pill-icon { font-size:18px; }
.pill-val  { font-size:22px; font-weight:900; color:#fff; line-height:1; }
.pill-lbl  { font-size:10px; color:rgba(255,255,255,0.55); font-weight:700; letter-spacing:.5px; text-transform:uppercase; }

#progressWrap {
  position:fixed; top:72px; left:50%; transform:translateX(-50%);
  width:min(260px,70vw); z-index:10; pointer-events:none;
}
#progressTrack { background:rgba(0,0,0,0.45); border-radius:8px; border:1px solid rgba(255,255,255,0.18); overflow:hidden; height:10px; }
#progressFill  { height:100%; border-radius:8px; transition:width .3s; background:linear-gradient(90deg,#00e676,#69ff47); box-shadow:0 0 14px #00e676cc; }
#progressLbl   { color:rgba(255,255,255,0.55); font-size:10px; text-align:center; margin-top:3px; font-weight:600; letter-spacing:.5px; }

#bossBar {
  position:fixed; top:0; left:50%; transform:translateX(-50%);
  width:min(340px,88vw); z-index:11; pointer-events:none; display:none; padding-top:14px;
}
#bossBarName { text-align:center; color:#fff; font-weight:900; font-size:13px; letter-spacing:1px; text-shadow:0 0 12px #ff4400; margin-bottom:5px; }
#bossBarTrack { background:rgba(0,0,0,0.6); border-radius:10px; border:2px solid rgba(255,100,0,0.5); overflow:hidden; height:18px; position:relative; }
#bossBarFill  { height:100%; border-radius:9px; transition:width .2s; background:linear-gradient(90deg,#ff1744,#ff6d00,#ffd600); box-shadow:0 0 18px #ff1744cc; position:relative; }
#bossBarFill::after { content:''; position:absolute; top:3px; left:8px; right:8px; height:4px; background:rgba(255,255,255,0.35); border-radius:2px; }
#bossBarPct { position:absolute; right:8px; top:50%; transform:translateY(-50%); color:#fff; font-size:11px; font-weight:800; z-index:1; }

.screen { position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; transition:opacity .35s; }
.screen.hidden { opacity:0; pointer-events:none; display:none; }

#startScreen { background:radial-gradient(ellipse at 50% 110%,#1a3a1a 0%,#0a1520 55%,#050810 100%); }
.start-glow { position:absolute; width:300px; height:300px; border-radius:50%; background:radial-gradient(circle,rgba(0,230,118,.18),transparent 70%); top:28%; left:50%; transform:translateX(-50%); pointer-events:none; }
.game-title { font-size:min(42px,10vw); font-weight:900; color:#fff; text-align:center; line-height:1.05; letter-spacing:-1px; text-shadow:0 0 40px rgba(0,230,118,.6),0 4px 20px rgba(0,0,0,.8); margin-bottom:6px; position:relative; }
.game-sub { font-size:13px; color:rgba(255,255,255,.5); letter-spacing:2px; text-transform:uppercase; margin-bottom:44px; }
.hero-row { display:flex; gap:10px; margin-bottom:44px; }
.mini-hero { width:22px; height:52px; display:flex; flex-direction:column; align-items:center; gap:2px; animation:heroFloat 1.1s ease-in-out infinite; }
.mini-hero:nth-child(2){animation-delay:.14s} .mini-hero:nth-child(3){animation-delay:.28s} .mini-hero:nth-child(4){animation-delay:.42s} .mini-hero:nth-child(5){animation-delay:.56s}
@keyframes heroFloat{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.btn-start { background:radial-gradient(circle, #ff0000 20%, #550000 70%, transparent); color:#fff; border:none; border-radius:50px; padding:18px 64px; font-size:20px; font-weight:900; cursor:pointer; letter-spacing:1px; box-shadow:0 8px 32px rgba(255,0,0,.45); transition:transform .15s,box-shadow .15s; pointer-events:all; -webkit-tap-highlight-color:transparent; }
.btn-start:active { transform:scale(.95); }

#resultScreen { background:rgba(0,0,0,.88); backdrop-filter:blur(6px); }
.result-card { background:linear-gradient(160deg,#0f1923,#1a2535); border-radius:28px; padding:36px 32px; width:min(340px,90vw); border:1.5px solid rgba(255,255,255,.1); box-shadow:0 24px 60px rgba(0,0,0,.6); text-align:center; }
.res-emoji { font-size:68px; margin-bottom:10px; display:block; animation:resPop .5s cubic-bezier(.34,1.56,.64,1); }
@keyframes resPop{ from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }
.res-title { font-size:34px; font-weight:900; margin-bottom:6px; }
.res-msg   { font-size:13px; color:rgba(255,255,255,.6); margin-bottom:24px; line-height:1.6; }
.res-stats { display:flex; justify-content:space-around; background:rgba(255,255,255,.07); border-radius:14px; padding:14px; margin-bottom:24px; }
.res-stat-v { font-size:24px; font-weight:900; color:#fff; }
.res-stat-l { font-size:10px; color:rgba(255,255,255,.45); font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-top:2px; }
.btn-next { width:100%; padding:16px; border-radius:50px; border:none; font-size:17px; font-weight:900; cursor:pointer; transition:transform .15s; letter-spacing:.5px; }
.btn-next:active { transform:scale(.97); }
.btn-next.win  { background:linear-gradient(135deg,#00e676,#1de9b6); color:#002211; }
.btn-next.lose { background:linear-gradient(135deg,#ff4444,#c62828); color:#fff; }

#adScreen { background:rgba(0,0,0,.93); }
.ad-card { background:linear-gradient(160deg,#111827,#1f2937); border-radius:22px; padding:28px; width:min(300px,86vw); border:1.5px solid rgba(255,255,255,.1); text-align:center; }
.ad-tag { font-size:10px; color:rgba(255,255,255,.35); letter-spacing:3px; text-transform:uppercase; margin-bottom:14px; }
.ad-banner { background:linear-gradient(135deg,#6366f1,#8b5cf6); border-radius:14px; padding:22px; margin-bottom:18px; }
.ad-ico { font-size:46px; margin-bottom:6px; }
.ad-title { color:#fff; font-size:17px; font-weight:800; }
.ad-desc  { color:rgba(255,255,255,.7); font-size:12px; margin-top:3px; }
.ad-skip  { color:rgba(255,255,255,.4); font-size:13px; }
#adSecs   { color:#fff; font-weight:800; }

.gflash { position:fixed; inset:0; pointer-events:none; z-index:15; display:flex; align-items:center; justify-content:center; }
.gflash-txt { font-size:min(64px,16vw); font-weight:900; color:#fff; letter-spacing:-1px; animation:gfAnim .65s forwards ease-out; }
@keyframes gfAnim{ 0%{transform:scale(.4) translateY(20px);opacity:1} 65%{transform:scale(1.25) translateY(-10px);opacity:1} 100%{transform:scale(1.5) translateY(-20px);opacity:0} }

#swipeHint { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.45); font-size:12px; z-index:10; pointer-events:none; display:flex; align-items:center; gap:10px; letter-spacing:1px; text-transform:uppercase; font-weight:700; }
.sArrow { font-size:18px; animation:sAnim 1.6s ease-in-out infinite; }
.sArrow:first-child { animation-direction:reverse; }
@keyframes sAnim{ 0%,100%{transform:translateX(0);opacity:.3} 50%{transform:translateX(7px);opacity:1} }

#battleInfo { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.65); font-size:12px; font-weight:700; letter-spacing:2px; z-index:10; pointer-events:none; display:none; text-transform:uppercase; background:rgba(0,0,0,.4); padding:6px 16px; border-radius:20px; border:1px solid rgba(255,255,255,.15); }

.combo-popup { position:fixed; z-index:16; pointer-events:none; font-size:26px; font-weight:900; color:#ffd600; text-shadow:0 0 20px #ffd600; animation:comboPop .85s forwards; }
@keyframes comboPop{ 0%{transform:translateY(0) scale(.5);opacity:1} 100%{transform:translateY(-60px) scale(1.3);opacity:0} }
.dmgNum { position:fixed; z-index:16; pointer-events:none; font-size:20px; font-weight:900; color:#ff4444; text-shadow:0 0 14px #ff4444; animation:dmgAnim .75s forwards; }
@keyframes dmgAnim{ 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-50px) scale(1.4);opacity:0} }

/* Screen flash on big hit */
.screen-flash { position:fixed; inset:0; pointer-events:none; z-index:14; background:rgba(255,80,0,.18); animation:sfAnim .25s forwards; }

#laneDots {
  position:fixed; bottom:60px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; z-index:10; pointer-events:none;
}
.ldot {
  width:10px; height:10px; border-radius:50%;
  background:rgba(255,255,255,0.3); border:1.5px solid rgba(255,255,255,0.5);
  transition:all 0.2s ease;
}
.ldot.active {
  background:#fff; transform:scale(1.4);
  box-shadow:0 0 8px rgba(255,255,255,0.8);
}
@keyframes sfAnim{ 0%{opacity:1} 100%{opacity:0} }

/* Player HP bar (bottom center during battle) */
#playerHpBar {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
  width:min(220px,60vw); z-index:11; pointer-events:none; display:none;
}
#playerHpName { text-align:center; color:#fff; font-weight:900; font-size:11px;
  letter-spacing:1px; margin-bottom:4px; }
#playerHpTrack { background:rgba(0,0,0,0.55); border-radius:8px;
  border:2px solid rgba(255,80,80,0.45); overflow:hidden; height:14px; }
#playerHpFill { height:100%; border-radius:7px; transition:width .25s;
  background:linear-gradient(90deg,#ff1744,#ff6d00);
  box-shadow:0 0 12px #ff1744aa; }

/* Blood splash DOM element */
.blood-splash {
  position:fixed; border-radius:50%; pointer-events:none; z-index:17;
  animation:bloodAnim 0.55s forwards ease-out;
}
@keyframes bloodAnim {
  0%   { transform:scale(0) translate(-50%,-50%); opacity:0.9; }
  40%  { transform:scale(1.4) translate(-50%,-50%); opacity:0.8; }
  100% { transform:scale(2)   translate(-50%,-50%); opacity:0; }
}

/* Boss flash on hit */
.boss-hit-flash { animation:bossFlash 0.15s steps(2) forwards; }
@keyframes bossFlash { 0%,100%{filter:none} 50%{filter:brightness(4) saturate(0)} }

/* Hit pause overlay — subtle white */
.hit-pause-overlay {
  position:fixed; inset:0; pointer-events:none; z-index:13;
  background:rgba(255,255,255,0.06); animation:hpAnim 0.1s forwards;
}
@keyframes hpAnim{ 0%{opacity:1} 100%{opacity:0} }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="hud">
  <div class="pill"><span class="pill-icon">👥</span><div><div class="pill-val" id="crowdCount">1</div><div class="pill-lbl">Crowd</div></div></div>
  <div class="pill"><span class="pill-icon">⭐</span><div><div class="pill-val" id="levelNum">1</div><div class="pill-lbl">Level</div></div></div>
</div>
<div id="progressWrap"><div id="progressTrack"><div id="progressFill" style="width:5%"></div></div><div id="progressLbl">Crowd Power</div></div>
<div id="bossBar"><div id="bossBarName">👹 BOSS</div><div id="bossBarTrack"><div id="bossBarFill" style="width:100%"></div><span id="bossBarPct">100%</span></div></div>
<div id="playerHpBar">
  <div id="playerHpName">❤️ YOU</div>
  <div id="playerHpTrack"><div id="playerHpFill" style="width:100%"></div></div>
</div>
<div id="swipeHint"><span class="sArrow">←</span>SWIPE TO STEER<span class="sArrow">→</span></div>
<div id="laneDots">
  <div class="ldot" id="ldot0"></div>
  <div class="ldot active" id="ldot1"></div>
  <div class="ldot" id="ldot2"></div>
</div>
<div id="battleInfo">⚔️ BATTLE IN PROGRESS</div>

<div class="screen" id="startScreen">
  <div class="start-glow"></div>
  <div class="game-title">CROWD<br>COLLECTOR<br>BATTLE</div>
  <div class="game-sub">Collect · Fight · Conquer</div>
  <div class="hero-row" id="heroRow"></div>
  <button class="btn-start" id="btnPlay" onclick="startGame()">▶ &nbsp;PLAY NOW</button>
</div>

<div class="screen hidden" id="resultScreen">
  <div class="result-card">
    <span class="res-emoji" id="resEmoji">🏆</span>
    <div class="res-title" id="resTitle">YOU WIN!</div>
    <div class="res-msg" id="resMsg"></div>
    <div class="res-stats">
      <div><div class="res-stat-v" id="resCrowd">0</div><div class="res-stat-l">Crowd</div></div>
      <div><div class="res-stat-v" id="resLevel">0</div><div class="res-stat-l">Level</div></div>
      <div><div class="res-stat-v" id="resBoss">0</div><div class="res-stat-l">Boss HP</div></div>
    </div>
    <button class="btn-next win" id="btnNext">NEXT LEVEL →</button>
  </div>
</div>

<div class="screen hidden" id="adScreen">
  <div class="ad-card">
    <div class="ad-tag">Advertisement</div>
    <div class="ad-banner"><div class="ad-ico" id="adIco">🎮</div><div class="ad-title" id="adTitle">Battle Arena</div><div class="ad-desc" id="adDesc">Play now!</div></div>
    <div class="ad-skip">Continuing in <span id="adSecs">5</span>s…</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
// ════════════════════════════════════════════
// AUDIO
// ════════════════════════════════════════════
const SFX = (() => {
  let ctx;
  function ac() { if(!ctx) { try { ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} } return ctx; }
  function osc(freq,dur,type,vol,delay=0) {
    try {
      const c=ac(); if(!c) return;
      const g=c.createGain(); const o=c.createOscillator();
      o.type=type; o.frequency.setValueAtTime(freq,c.currentTime+delay);
      g.gain.setValueAtTime(vol,c.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+dur);
      o.connect(g); g.connect(c.destination);
      o.start(c.currentTime+delay); o.stop(c.currentTime+delay+dur);
    } catch(e) {}
  }
  function noise(dur,vol,delay=0) {
    try {
      const c=ac(); if(!c) return;
      const buf=c.createBuffer(1,Math.ceil(c.sampleRate*dur),c.sampleRate);
      const d=buf.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
      const s=c.createBufferSource(); s.buffer=buf;
      const g=c.createGain(); g.gain.setValueAtTime(vol,c.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+delay+dur);
      s.connect(g); g.connect(c.destination); s.start(c.currentTime+delay);
    } catch(e) {}
  }
  return {
    hit()    { osc(160,.15,'sawtooth',.12); noise(.08,.08); osc(80,.08,'sine',.08,.02); },
    bigHit() { osc(100,.25,'sawtooth',.2); noise(.18,.15); osc(220,.12,'square',.1,.03); osc(440,.08,'sine',.06,.05); },
    gate(up) { if(up){osc(600,.08,'square',.07);osc(900,.1,'sine',.06,.06);} else {osc(300,.1,'sawtooth',.1);osc(180,.15,'sine',.07,.05);} },
    collect(){ osc(440,.06,'sine',.08); osc(660,.05,'sine',.06,.04); },
    win()    { [500,600,750,900,1100].forEach((f,i)=>osc(f,.3,'sine',.12,i*.08)); },
    lose()   { [400,320,250,180].forEach((f,i)=>osc(f,.3,'sawtooth',.1,i*.09)); },
  };
})();

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
const G = {
  scene:null, cam:null, ren:null,
  state:'start', crowd:1, level:1,
  // 3-lane system: 0=left, 1=center, 2=right
  lane:1, targetLane:1,
  LANES:[-3.5, 0, 3.5],
  playerX:0, targetX:0,
  laneT:0, laneDur:0.2, laneMoving:false,
  runZ:0, levelLen:130,
  gates:[], crowdMeshes:[], boss:null,
  bossHP:0, bossMaxHP:0, battleTimer:0, lastHit:0, hitCount:0,
  bossKillTimer:0,
  // Camera shake
  camShake:0, camShakeX:0, camShakeY:0,
  // Camera rotation (limited, behind player)
  camYaw:0, camTargetYaw:0, camPitch:0.18,
  t:0, groundTiles:[], envObjs:[], particles:[],
  // Touch
  touchStartX:0, touchStartY:0, touchStartT:0, touchActive:false,
  mDown:false, lastMX:0,
  COLORS:[0xff6b6b,0xffd93d,0x6bcb77,0x4d96ff,0xff9f43,0xc77dff,0x48cae4,0xf8961e,0xff6fd8,0x43e97b],
  // Per-fighter attack cooldowns & roles
  fighterCooldowns:[], attackRange:3.2, bossDeathPlayed:false,
  // Character count cap
  MAX_CROWD: 15,
  // Boss player health (boss attacks reduce this)
  playerHP: 100, playerMaxHP: 100,
  // Hit pause (freeze frames)
  hitPause: 0, hitPauseMax: 0.08,
  // Active attackers limit
  MAX_ATTACKERS: 3,
  // Blood splash pool
  splashPool:[],
};

// ════════════════════════════════════════════
// THREE INIT
// ════════════════════════════════════════════
function initThree() {
  const cv = document.getElementById('gameCanvas');
  G.scene = new THREE.Scene();
  G.scene.background = new THREE.Color(0x87ceeb);
  G.scene.fog = new THREE.Fog(0x87ceeb, 20, 180);

  G.cam = new THREE.PerspectiveCamera(55, cv.clientWidth/cv.clientHeight, 0.1, 300);
  G.cam.position.set(0,9,13);

  G.ren = new THREE.WebGLRenderer({canvas:cv, antialias:true, powerPreference:'high-performance'});
  G.ren.setSize(cv.clientWidth, cv.clientHeight);
  G.ren.setPixelRatio(Math.min(devicePixelRatio,2));
  G.ren.shadowMap.enabled = true;
  G.ren.shadowMap.type = THREE.PCFSoftShadowMap;
  G.ren.toneMapping = THREE.ACESFilmicToneMapping;
  G.ren.toneMappingExposure = 1.15;

  // New lighting setup
  G.scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const sun = new THREE.DirectionalLight(0xfff2cc, 2.2);
  sun.position.set(25,40,20);
  sun.castShadow = true;
  sun.shadow.mapSize.set(4096,4096);
  sun.shadow.camera.near = 0.1;
  sun.shadow.camera.far = 300;
  sun.shadow.camera.left=-70; sun.shadow.camera.right=70;
  sun.shadow.camera.top=70; sun.shadow.camera.bottom=-70;
  G.scene.add(sun);
  // Soft fill light
  const fill = new THREE.DirectionalLight(0x88aaff, 0.6);
  fill.position.set(-15,10,-10);
  G.scene.add(fill);

  // Sky dome
  const skyDome = new THREE.Mesh(new THREE.SphereGeometry(220,16,8),new THREE.MeshBasicMaterial({color:0x87ceeb,side:THREE.BackSide}));
  G.scene.add(skyDome);

  // Clouds
  for(let i=0;i<18;i++) addCloud((Math.random()-.5)*220, 28+Math.random()*14, -(Math.random()*220));

  window.addEventListener('resize',()=>{
    G.ren.setSize(cv.clientWidth,cv.clientHeight);
    G.cam.aspect=cv.clientWidth/cv.clientHeight;
    G.cam.updateProjectionMatrix();
    if(G.composer) G.composer.setSize(cv.clientWidth,cv.clientHeight);
  });

  // Bloom Composer
  try {
    const composer = new THREE.EffectComposer(G.ren);
    composer.addPass(new THREE.RenderPass(G.scene, G.cam));
    const bloom = new THREE.UnrealBloomPass(
      new THREE.Vector2(cv.clientWidth, cv.clientHeight),
      0.8, 0.4, 0.85
    );
    composer.addPass(bloom);
    G.composer = composer;
  } catch(e) { G.composer = null; }
}

function addCloud(x,y,z) {
  const g=new THREE.Group();
  const m=new THREE.MeshLambertMaterial({color:0xffffff});
  for(let i=0;i<5;i++){
    const s=new THREE.Mesh(new THREE.SphereGeometry(2+Math.random()*2.5,8,6),m);
    s.position.set((Math.random()-.5)*5,(Math.random()-.5)*2,(Math.random()-.5)*4);
    g.add(s);
  }
  g.position.set(x,y,z);
  G.scene.add(g);
}

// ════════════════════════════════════════════
// LEVEL BUILD
// ════════════════════════════════════════════
function buildLevel() {
  G.groundTiles.forEach(o=>G.scene.remove(o)); G.groundTiles=[];
  G.envObjs.forEach(o=>G.scene.remove(o));     G.envObjs=[];
  G.gates.forEach(g=>G.scene.remove(g.grp));   G.gates=[];
  G.crowdMeshes.forEach(c=>G.scene.remove(c.grp)); G.crowdMeshes=[];
  G.particles.forEach(p=>G.scene.remove(p.m));      G.particles=[];
  if(G.boss){ G.scene.remove(G.boss.grp); G.boss=null; }
  G.runZ=0; G.playerX=0; G.targetX=0; G.lane=1; G.targetLane=1; G.laneT=0; G.laneMoving=false; G.hitCount=0; G.bossKillTimer=0;

  const L=G.levelLen;
  const tc=[0x57a842,0x4e9e3b,0x62b34d];
  for(let z=0;z<L+30;z+=5){
    const t=new THREE.Mesh(new THREE.BoxGeometry(14,.4,5),new THREE.MeshStandardMaterial({color:tc[z%3],roughness:0.9,metalness:0.1}));
    t.receiveShadow=true; t.position.set(0,-.2,-z-2.5); G.scene.add(t); G.groundTiles.push(t);
  }
  for(let z=0;z<L+30;z+=10){
    [-11,11].forEach(x=>{
      const s=new THREE.Mesh(new THREE.BoxGeometry(8,.35,10),new THREE.MeshStandardMaterial({color:0x5fbf4a,roughness:0.9,metalness:0.1}));
      s.position.set(x,-.17,-z-5); s.receiveShadow=true; G.scene.add(s); G.groundTiles.push(s);
    });
  }
  // Center lane stripe
  for(let z=0;z<L;z+=6){
    const s=new THREE.Mesh(new THREE.BoxGeometry(.15,.42,3),new THREE.MeshBasicMaterial({color:0xffffff,opacity:.3,transparent:true}));
    s.position.set(0,0,-z-1.5); G.scene.add(s); G.groundTiles.push(s);
  }
  // Trees
  for(let z=8;z<L;z+=12){
    [-9.5,9.5].forEach(x=>{
      const t=makeTree(); t.position.set(x+(Math.random()-.5)*2,0,-z-Math.random()*5);
      G.scene.add(t); G.envObjs.push(t);
    });
  }
  // Rocks
  for(let i=0;i<18;i++){
    const x=(Math.random()>.5?1:-1)*(7.5+Math.random()*3);
    const r=makeRock(); r.position.set(x,0,-(5+Math.random()*(L-10)));
    G.scene.add(r); G.envObjs.push(r);
  }

  // Gates
  const GT=[
    {lbl:'+5',  color:0x00e676,dark:0x007a3a,val:5, op:'add'},
    {lbl:'+10', color:0x00bcd4,dark:0x006070,val:10,op:'add'},
    {lbl:'×2',  color:0xff9800,dark:0x7a4800,val:2, op:'mul'},
    {lbl:'-5',  color:0xf44336,dark:0x7a1c18,val:5, op:'sub'},
  ];
  const ng=3+G.level;
  for(let i=0;i<ng;i++){
    const z=-16-i*(L-34)/ng;
    let l=GT[Math.floor(Math.random()*GT.length)];
    let r=GT[Math.floor(Math.random()*GT.length)];
    if(l.op==='sub'&&r.op==='sub') r=GT[0];
    addGate(z,-3.5,l); addGate(z,3.5,r);
  }

  // Leader
  addCrowdMember(0,0,0,0xffcc00,true);

  // Boss
  // Boss HP scales with crowd size too — harder to kill with few people
  const bHP = 60 + G.level*35 + G.crowd*4;
  G.bossHP=G.bossMaxHP=bHP;
  G.boss=makeBoss();
  G.boss.grp.position.set(0,0,-(L-6));
  G.scene.add(G.boss.grp);

  // UI reset
  document.getElementById('bossBar').style.display='none';
  document.getElementById('playerHpBar').style.display='none';
  document.getElementById('bossBarFill').style.width='100%';
  document.getElementById('bossBarPct').textContent='100%';
  updateCrowdUI();
}

function makeTree() {
  const g=new THREE.Group();
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(.22,.32,2.2,7),new THREE.MeshLambertMaterial({color:0x7a5c2e}));
  tr.position.y=1.1; tr.castShadow=true; g.add(tr);
  const lc=[0x2d7a2d,0x3a9a3a,0x22a522];
  for(let i=0;i<3;i++){
    const lf=new THREE.Mesh(new THREE.ConeGeometry(1.5-i*.12,2,8),new THREE.MeshLambertMaterial({color:lc[i%3]}));
    lf.position.y=2.3+i*1.4; lf.castShadow=true; g.add(lf);
  }
  return g;
}
function makeRock() {
  const g=new THREE.Group();
  const m=new THREE.MeshLambertMaterial({color:0x8a8585});
  for(let i=0;i<3;i++){
    const r=.3+Math.random()*.4;
    const s=new THREE.Mesh(new THREE.DodecahedronGeometry(r,0),m);
    s.position.set((Math.random()-.5)*.5,r*.6,(Math.random()-.5)*.5);
    s.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);
    s.castShadow=true; g.add(s);
  }
  return g;
}

// GATE
// ════════════════════════════════════════════
function addGate(z,x,type) {
  const g=new THREE.Group();
  const mat=new THREE.MeshLambertMaterial({color:type.color});
  const dMat=new THREE.MeshLambertMaterial({color:type.dark});
  // Posts
  [-0.65,0.65].forEach(ox=>{
    const post=new THREE.Mesh(new THREE.CylinderGeometry(.1,.12,6,8),dMat);
    post.position.set(ox,3,0); post.castShadow=true; g.add(post);
    const glow=new THREE.Mesh(new THREE.SphereGeometry(.18,8,8),mat);
    glow.position.set(ox,6.15,0); g.add(glow);
  });
  const bar=new THREE.Mesh(new THREE.BoxGeometry(1.5,.14,.14),dMat);
  bar.position.set(0,6.05,0); g.add(bar);
  const arch=new THREE.Mesh(new THREE.BoxGeometry(1.55,.55,.28),mat);
  arch.position.set(0,5.35,0); arch.castShadow=true; g.add(arch);
  // Label
  const cv=document.createElement('canvas'); cv.width=256; cv.height=128;
  const cx=cv.getContext('2d');
  const hexCol = ('000000' + (type.color >>> 0).toString(16)).slice(-6);
  cx.fillStyle='#'+hexCol;
  cx.beginPath(); cx.rect(6,6,244,116); cx.fill();
  cx.fillStyle='#fff'; cx.font='bold 70px Arial'; cx.textAlign='center'; cx.textBaseline='middle'; cx.fillText(type.lbl,128,68);
  const lbl=new THREE.Mesh(new THREE.PlaneGeometry(1.9,.95),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(cv),transparent:true}));
  lbl.position.set(0,5.35,.15); g.add(lbl);
  // Disc
  const disc=new THREE.Mesh(new THREE.CircleGeometry(1.4,16),new THREE.MeshBasicMaterial({color:type.color,transparent:true,opacity:.22,depthWrite:false}));
  disc.rotation.x=-Math.PI/2; disc.position.y=.02; g.add(disc);
  g.position.set(x,0,z);
  G.scene.add(g);
  G.gates.push({grp:g,x,z,type,hit:false});
}

function dk(hex,f){ return ((((hex>>16)&255)*f)<<16)|((((hex>>8)&255)*f)<<8)|(((hex&255)*f)); }

function makeCharacter(color, isLeader, sc) {

  // Forearms

  // Belt
  const belt=new THREE.Mesh(new THREE.CylinderGeometry(.22*s,.22*s,.08*s,10),darkM);

function addCrowdMember(x,y,z,color,isLeader) {
  const sc=isLeader?1.1:.88;
  const m=makeCharacter(color,isLeader,sc);
  m.position.set(x,0,z);
  G.scene.add(m);
  G.crowdMeshes.push({
    grp:m, isLeader, offset:{x:0,z:0},
    phase:Math.random()*Math.PI*2,
    attackPhase:Math.random()*Math.PI*2,
    orbitAngle:Math.random()*Math.PI*2,
    orbitIdx:0,
    color,
  });
}

  const sh=new THREE.Mesh(new THREE.CircleGeometry(1.5*s,16),new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:.3,depthWrite:false}));
  sh.rotation.x=-Math.PI/2; sh.position.y=.01; g.add(sh);

// ════════════════════════════════════════════
// CROWD MANAGEMENT
// ════════════════════════════════════════════
function updateFormation() {
  const n = G.crowdMeshes.length;
  const SPACING_X = 1.1;  // horizontal gap between characters
  const SPACING_Z = 1.1;  // depth gap between rows
  const COLS = 5;          // max characters per row

  // Leader always at front-center
  G.crowdMeshes[0].offset.x = 0;
  G.crowdMeshes[0].offset.z = 0;

  // Followers fill rows behind leader: row 0 is closest behind
  let followerIdx = 0;
  for(let i = 1; i < n; i++) {
    const row = Math.floor(followerIdx / COLS);
    const col = followerIdx % COLS;
    const rowWidth = Math.min(COLS, n - 1 - row * COLS);
    // Center the row
    const startX = -(rowWidth - 1) * SPACING_X / 2;
    G.crowdMeshes[i].offset.x = startX + col * SPACING_X;
    G.crowdMeshes[i].offset.z = (row + 1) * SPACING_Z; // behind leader
    followerIdx++;
  }
}
function rebuildCrowd() {
  while(G.crowdMeshes.length>G.crowd){ G.scene.remove(G.crowdMeshes.pop().grp); }
  while(G.crowdMeshes.length<G.crowd){
    const color=G.COLORS[G.crowdMeshes.length%G.COLORS.length];
    addCrowdMember(0,0,0,color,false);
  }
  G.crowdMeshes.forEach((cm,i)=>{ cm.orbitIdx=i; cm.orbitAngle=i/G.crowdMeshes.length*Math.PI*2; });
  updateFormation();
  updateCrowdUI();
}
function updateCrowdUI() {
  document.getElementById('crowdCount').textContent=G.crowd;
  const pct=Math.min(100,(G.crowd/(G.bossMaxHP/3))*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLbl').textContent='Crowd Power: '+G.crowd;
}

function spawnPfx(pos, color, count, speed) {
  for(let i=0;i<count;i++){
    const m=new THREE.Mesh(new THREE.SphereGeometry(.1,4,4),new THREE.MeshBasicMaterial({color,transparent:true}));
    m.position.copy(pos);
    const a=Math.random()*Math.PI*2, el=Math.random()*Math.PI-.5, sp=speed*.6+Math.random()*speed;
    const vel=new THREE.Vector3(Math.cos(a)*Math.cos(el)*sp,Math.abs(Math.sin(el))*sp+1.5,Math.sin(a)*Math.cos(el)*sp);
    G.scene.add(m);
    G.particles.push({m,vel,life:1,ml:1});
  }
}
function spawnStars(pos) {
  for(let i=0;i<22;i++){
    const m=new THREE.Mesh(new THREE.OctahedronGeometry(.14,0),new THREE.MeshBasicMaterial({color:[0xffd600,0xff6600,0xff4444,0x00e676][Math.floor(Math.random()*4)],transparent:true}));
    m.position.copy(pos);
    const a=Math.random()*Math.PI*2, sp=4+Math.random()*6;
    const vel=new THREE.Vector3(Math.cos(a)*sp,(Math.random()+.5)*sp*.8,Math.sin(a)*sp);
    G.scene.add(m);
    G.particles.push({m,vel,life:1.5,ml:1.5});
  }
}
function spawnDust(pos) {
  for(let i=0;i<10;i++){
    const m=new THREE.Mesh(new THREE.SphereGeometry(.15+Math.random()*.1,4,4),new THREE.MeshBasicMaterial({color:0xc8a870,transparent:true,opacity:.7}));
    m.position.copy(pos); m.position.y+=.1;
    const a=Math.random()*Math.PI*2, sp=1+Math.random()*2;
    const vel=new THREE.Vector3(Math.cos(a)*sp,.3+Math.random()*.7,Math.sin(a)*sp);
    G.scene.add(m);
    G.particles.push({m,vel,life:.7,ml:.7});

function spawnShockwave(pos) {
  const m=new THREE.Mesh(new THREE.RingGeometry(.1,1.5,16),new THREE.MeshBasicMaterial({color:0xff3300,transparent:true,opacity:.7,side:THREE.DoubleSide,depthWrite:false}));
  m.rotation.x=-Math.PI/2; m.position.copy(pos); m.position.y=.2;
  G.scene.add(m);
  G.particles.push({m,vel:new THREE.Vector3(0,0,0),life:.5,ml:.5,isShock:true,startScale:1});
}
function updateParticles(dt) {
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];
    p.life-=dt*1.3;
    if(p.isShock){
      const sc=1+4*(1-p.life/p.ml);
      p.m.scale.set(sc,1,sc);
    } else {
      p.vel.y-=11*dt;
      p.m.position.addScaledVector(p.vel,dt);
    }
    const a=Math.max(0,p.life/p.ml);
    p.m.material.opacity=a;
    if(!p.isShock) p.m.scale.setScalar(.3+a*.7);
    if(p.life<=0){ G.scene.remove(p.m); G.particles.splice(i,1); }
  }
}

// ════════════════════════════════════════════
// ANIMATIONS
// ════════════════════════════════════════════
function animRun(cm,t) {
  const {_lUL:lUL,_rUL:rUL,_lLL:lLL,_rLL:rLL,_lUA:lUA,_rUA:rUA,_lFA:lFA,_rFA:rFA,_torso:torso,_head:head,_sc:sc}=cm.grp;

  // Transition blend: speed ramps from 0 → full over 0.5s
  if(!cm._runBlend) cm._runBlend = 0;
  cm._runBlend = Math.min(1, cm._runBlend + 0.05);
  const blend = cm._runBlend;

  const f   = t * 9;
  const amp = .65 * blend; // legs scale up as blend increases

  lUL.rotation.x =  Math.sin(f) * amp;
  rUL.rotation.x = -Math.sin(f) * amp;
  lLL.rotation.x =  Math.max(0, Math.sin(f+.5))  * amp * .8;
  rLL.rotation.x =  Math.max(0, Math.sin(f+.5+Math.PI)) * amp * .8;
  lUA.rotation.x = -Math.sin(f) * .55 * blend;
  rUA.rotation.x =  Math.sin(f) * .55 * blend;
  lFA.rotation.x =  Math.max(0, Math.sin(f+.3)) * .4  * blend;
  rFA.rotation.x =  Math.max(0, Math.sin(f+.3+Math.PI)) * .4 * blend;
  torso.rotation.x = -.18 * blend;
  head.position.y = sc*1.72 + Math.abs(Math.sin(f)) * .04 * sc * blend;
  cm.grp.position.y = Math.abs(Math.sin(f)) * .14 * blend;
}

function animAttack(cm,t,bossPos,dt) {
  const {_lUL:lUL,_rUL:rUL,_lLL:lLL,_rLL:rLL,_lUA:lUA,_rUA:rUA,_lFA:lFA,_rFA:rFA,_torso:torso}=cm.grp;

  // ── ENEMY AI: check distance, move toward boss if out of range ──
  const dx3 = cm.grp.position.x - bossPos.x;
  const dz3 = cm.grp.position.z - bossPos.z;
  const dist = Math.sqrt(dx3*dx3 + dz3*dz3);

  const orbitN   = G.crowdMeshes.length;
  const ringIdx  = Math.floor(cm.orbitIdx / Math.max(1, Math.ceil(orbitN/8)));
  const targetR  = 2.0 + ringIdx * 1.0;   // desired orbit radius per ring

  if(dist > targetR + 1.5) {
    // TOO FAR: run straight toward orbit position (approach phase)
    cm.orbitAngle += 0.5 * dt;             // slower angle while approaching
    const tx = bossPos.x + Math.cos(cm.orbitAngle) * targetR;
    const tz = bossPos.z + Math.sin(cm.orbitAngle) * targetR;
    cm.grp.position.x += (tx - cm.grp.position.x) * 7 * dt; // fast approach
    cm.grp.position.z += (tz - cm.grp.position.z) * 7 * dt;
    // Run animation while approaching
    lUL.rotation.x =  Math.sin(t*9+cm.phase)*.65;
    rUL.rotation.x = -Math.sin(t*9+cm.phase)*.65;
    lUA.rotation.x = -Math.sin(t*9)*.5;
    rUA.rotation.x =  Math.sin(t*9)*.5;
    torso.rotation.x = -.2;
  } else {
    // IN RANGE: orbit and attack
    const speed = 1.3 / (ringIdx + 1);
    cm.orbitAngle += speed * dt;
    const tx = bossPos.x + Math.cos(cm.orbitAngle) * targetR;
    const tz = bossPos.z + Math.sin(cm.orbitAngle) * targetR;
    cm.grp.position.x += (tx - cm.grp.position.x) * 5 * dt;
    cm.grp.position.z += (tz - cm.grp.position.z) * 5 * dt;

    // ── PUNCH / KICK ANIMATIONS (smooth transitions) ──
    const ap    = t * 6 + cm.attackPhase;
    const punch = Math.sin(ap);
    const kp    = t * 3 + cm.phase;
    const kicking = Math.sin(kp) > 0.8;

    if(kicking) {
      // Kick: raise front leg high toward boss
      lUL.rotation.x = -Math.PI * .5;
      lLL.rotation.x =  Math.PI * .35;
      rUL.rotation.x =  Math.sin(kp) * .25;
      rLL.rotation.x = 0;
      // Arms out for balance
      lUA.rotation.x = .3; rUA.rotation.x = .3;
      lFA.rotation.x = 0;  rFA.rotation.x = 0;
    } else if(punch > 0) {
      // Right hook
      rUA.rotation.x = -Math.PI*.6 - punch*.7; rFA.rotation.x = -punch*.5;
      lUA.rotation.x =  .15 + Math.sin(ap+Math.PI)*.25; lFA.rotation.x = 0;
      lUL.rotation.x =  Math.sin(t*4+cm.phase)*.3;
      rUL.rotation.x = -Math.sin(t*4+cm.phase)*.3;
      lLL.rotation.x = 0;
    } else {
      // Left jab
      lUA.rotation.x = -Math.PI*.6 + punch*.7; lFA.rotation.x = punch*.5;
      rUA.rotation.x =  .15 + Math.sin(ap)*.25; rFA.rotation.x = 0;
      lUL.rotation.x =  Math.sin(t*4+cm.phase)*.3;
      rUL.rotation.x = -Math.sin(t*4+cm.phase)*.3;
      lLL.rotation.x = 0;
    }
    torso.rotation.x = -.1;
  }

  // Hover bob
  cm.grp.position.y = Math.abs(Math.sin(t*5+cm.phase)) * .07;

  // Face boss (smooth rotation)
  const fx = bossPos.x - cm.grp.position.x;
  const fz = bossPos.z - cm.grp.position.z;
  const targetRY = Math.atan2(fx, fz);
  const diffY = ((targetRY - cm.grp.rotation.y + Math.PI*3) % (Math.PI*2)) - Math.PI;
  cm.grp.rotation.y += diffY * 0.2; // smooth turn
}

function animBoss(dt) {
  if(!G.boss) return;
  const b = G.boss; const t = G.t;

  // Skip normal animation if dead (death handled in updateBattle)
  if(b.dead) return;

  if(G.state === 'battle') {
    const rage = 1 - G.bossHP / G.bossMaxHP; // 0=full HP, 1=dead
    const rageSpeed = 1 + rage * 1.5;         // moves faster when hurt

    // ── STOMP / WALK ──
    b.lUL.rotation.x =  Math.sin(t * 2.5 * rageSpeed) * .55;
    b.rUL.rotation.x = -Math.sin(t * 2.5 * rageSpeed) * .55;
    b.lLL.rotation.x =  Math.max(0, Math.sin(t * 2.5 * rageSpeed + .6)) * .4;
    b.rLL.rotation.x =  Math.max(0, Math.sin(t * 2.5 * rageSpeed + .6 + Math.PI)) * .4;

    // ── CLUB SLAM (faster when enraged) ──
    const slamFreq = 1.8 * rageSpeed;
    b.rUA.rotation.x = Math.sin(t * slamFreq) * 1.2 - 1.0;
    b.rFA.rotation.x = Math.sin(t * slamFreq + .6) * .8;
    b.lUA.rotation.x = -Math.sin(t * 1.4) * .5;
    b.lFA.rotation.x = 0;

    // ── HEAD: look around at attackers ──
    b.head.rotation.x = Math.sin(t * 2) * .2;
    b.head.rotation.y = Math.sin(t * .7) * .3;

    // ── RING PULSE ──
    b.ring.material.opacity = (.12 + Math.sin(t*5)*.08) * (G.bossHP/G.bossMaxHP);
    b.ring.rotation.z += dt * (.8 + rage * 1.2);

    // ── RAGE SCALE PULSE (bigger trembling when low HP) ──
    const pulse = 1 + Math.sin(t * (3 + rage*6)) * (0.02 + rage * 0.06);
    b.grp.scale.set(pulse, pulse, pulse);

    // ── HIT SHAKE ──
    if(b.shakeT > 0) {
      b.grp.position.x  = (Math.random()-.5) * .6;
      b.grp.position.z += (Math.random()-.5) * .15;
      b.shakeT -= dt;
    } else {
      b.grp.position.x += (0 - b.grp.position.x) * .18;
    }

    // ── FLASH RED when very low HP ──
    if(rage > 0.75 && b.body) {
      const flash = 0.5 + Math.sin(t*8)*.5;
      b.body.material.emissive = b.body.material.emissive || new THREE.Color(0);
      b.body.material.emissive.setRGB(flash*.3, 0, 0);
    }

  } else {
    // Idle intimidation before battle
    b.lUA.rotation.x =  Math.sin(t) * .22;
    b.rUA.rotation.x = -Math.sin(t) * .22;
    b.grp.position.y =  Math.sin(t * .85) * .22;
    b.ring.rotation.z += dt * .4;
    b.head.rotation.y = Math.sin(t * .5) * .2;
  }
}

function changeLane(dir) {
  // dir: -1 = left, +1 = right
  const next = Math.max(0, Math.min(2, G.targetLane + dir));
  if(next === G.targetLane) return; // already at edge
  G.lane = G.targetLane; // snap from position
  G.targetLane = next;
  G.targetX = G.LANES[G.targetLane];
  G.laneT = 0;
  G.laneMoving = true;
  // Update lane dots
  [0,1,2].forEach(i => {
    const d = document.getElementById('ldot'+i);
    if(d) d.classList.toggle('active', i === G.targetLane);
  });
  // Visual arrow flash
  showLaneIndicator(dir);
}

function showLaneIndicator(dir) {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-size:48px; pointer-events:none; z-index:15; opacity:1;
    animation:laneFlash 0.35s forwards ease-out;
  `;
  el.textContent = dir < 0 ? '◀' : '▶';
  if(!document.getElementById('laneFlashStyle')) {
    const s = document.createElement('style');
    s.id = 'laneFlashStyle';
    s.textContent = '@keyframes laneFlash{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.8)}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 380);
}

function setupInput() {
  // ── TOUCH: detect discrete swipe left/right ──
  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    G.touchStartX = t.clientX;
    G.touchStartY = t.clientY;
    G.touchStartT = Date.now();
    G.touchActive = true;
  }, {passive: true});

  document.addEventListener('touchmove', e => {
    if(!G.touchActive || G.state !== 'running') return;
    const dx = e.touches[0].clientX - G.touchStartX;
    const dy = e.touches[0].clientY - G.touchStartY;
    const THRESHOLD = 28; // px needed to trigger lane change
    // Only trigger once per swipe gesture
    if(Math.abs(dx) > THRESHOLD && Math.abs(dx) > Math.abs(dy) * 1.2) {
      changeLane(dx > 0 ? 1 : -1);
      // Reset start so holding doesn't keep triggering
      G.touchStartX = e.touches[0].clientX;
      G.touchStartY = e.touches[0].clientY;
    }
  }, {passive: true});

  document.addEventListener('touchend', e => {
    G.touchActive = false;
  }, {passive: true});

  // ── MOUSE: click-drag for desktop testing ──
  document.addEventListener('mousedown', e => { G.mDown = true; G.lastMX = e.clientX; });
  document.addEventListener('mousemove', e => {
    if(!G.mDown || G.state !== 'running') return;
    const dx = e.clientX - G.lastMX;
    if(Math.abs(dx) > 40) {
      changeLane(dx > 0 ? 1 : -1);
      G.lastMX = e.clientX;
    }
  });
  document.addEventListener('mouseup', () => { G.mDown = false; });

  // ── KEYBOARD: arrow keys ──
  document.addEventListener('keydown', e => {
    if(G.state !== 'running') return;
    if(e.key === 'ArrowLeft')  changeLane(-1);
    if(e.key === 'ArrowRight') changeLane(1);
  });

  // ── PLAY BUTTON: belt-and-suspenders listener ──
  const playBtn = document.getElementById('btnPlay');
  if(playBtn) {
    playBtn.addEventListener('touchend', e => {
      e.preventDefault();
      startGame();
    }, {passive:false});
    playBtn.addEventListener('click', () => startGame());
  }
}

// Flash the boss mesh white on hit
function flashBoss() {
  if(!G.boss) return;
  // Store original materials and swap to white temporarily
  const grp = G.boss.grp;
  const origMats = [];
  const whiteMat = new THREE.MeshBasicMaterial({color:0xffffff});
  grp.traverse(child => {
    if(child.isMesh) {
      origMats.push({mesh:child, mat:child.material});
      child.material = whiteMat;
    }
  });
  setTimeout(() => {
    origMats.forEach(({mesh, mat}) => { mesh.material = mat; });
  }, 80);
}

// ════════════════════════════════════════════
// RUNNING STATE
// ════════════════════════════════════════════
// Smooth easing for lane transition
function easeInOut(t) { return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

function updateRunning(dt) {
  const spd = 8 + G.level * 0.6;
  G.runZ += spd * dt; // always moves forward

  // ── LANE TRANSITION ──
  if(G.laneMoving) {
    G.laneT += dt;
    const progress = Math.min(1, G.laneT / G.laneDur);
    const eased = easeInOut(progress);
    const fromX = G.LANES[G.lane];
    const toX   = G.LANES[G.targetLane];
    G.playerX = fromX + (toX - fromX) * eased;
    // Tilt character during lane change
    const tiltDir = toX > fromX ? -1 : 1;
    const tiltAmt = Math.sin(progress * Math.PI) * 0.3 * tiltDir;
    if(G.crowdMeshes.length > 0) G.crowdMeshes[0].grp.rotation.z = tiltAmt;
    if(progress >= 1) {
      G.lane = G.targetLane;
      G.playerX = G.LANES[G.lane];
      G.laneMoving = false;
      if(G.crowdMeshes.length > 0) G.crowdMeshes[0].grp.rotation.z = 0;
    }
  }
  G.targetX = G.LANES[G.targetLane];

  // ── CAMERA: limited-rotation third-person, stays behind player ──
  // Gently yaw toward lane center (max ±30 deg from behind)
  const laneOffset = G.playerX / 4.5; // -1 to 1
  G.camTargetYaw = laneOffset * 0.30; // max ~17 deg
  G.camYaw += (G.camTargetYaw - G.camYaw) * 5 * dt; // smooth lerp

  const camDist = 11;
  const camH    = 7.5;
  const playerZ = -G.runZ;
  // Camera sits behind+above player, rotated by yaw
  const camOffX = Math.sin(G.camYaw) * camDist;
  const camOffZ = Math.cos(G.camYaw) * camDist;
  const tCamX = G.playerX + camOffX;
  const tCamZ = playerZ + camOffZ;
  // Shake offset
  const shakeX = G.camShake > 0 ? (Math.random()-.5)*G.camShake*0.4 : 0;
  const shakeY = G.camShake > 0 ? (Math.random()-.5)*G.camShake*0.25 : 0;
  G.camShake = Math.max(0, G.camShake - dt * 8);
  G.cam.position.x += (tCamX - G.cam.position.x) * 7 * dt + shakeX;
  G.cam.position.z += (tCamZ - G.cam.position.z) * 7 * dt;
  G.cam.position.y += (camH   - G.cam.position.y) * 4 * dt + shakeY;
  // Look slightly ahead of player, not directly at feet
  G.cam.lookAt(G.playerX * 0.4, 1.8, playerZ - 4);

  // ── CROWD FOLLOW ──
  G.crowdMeshes.forEach((cm) => {
    const tx = G.playerX + cm.offset.x;
    const tz = -G.runZ + cm.offset.z;
    cm.grp.position.x += (tx - cm.grp.position.x) * 8 * dt;
    cm.grp.position.z += (tz - cm.grp.position.z) * 8 * dt;
    if(!cm.isLeader) cm.grp.rotation.z = 0; // followers don't tilt
    animRun(cm, G.t + cm.phase);
  });

  // ── GATE COLLISION (lane-aware, wider detection) ──
  G.gates.forEach(gate => {
    if(gate.hit) return;
    const dz = Math.abs(gate.z + G.runZ);
    const dx = Math.abs(gate.x - G.playerX);
    if(dz < 1.5 && dx < 2.2) {
      gate.hit = true;
      const p = gate.grp.position.clone(); p.y += 3;
      applyGate(gate.type, p);
      gate.grp.position.y = -30;
    }
  });

  if(G.runZ >= G.levelLen - 8) startBattle();
}

function applyGate(type, pos) {
  // Apply gate effect
  if(type.op==='add') G.crowd = G.crowd + type.val;
  else if(type.op==='sub') G.crowd = G.crowd - type.val;
  else if(type.op==='mul') G.crowd = G.crowd * type.val;
  // Clamp: min 1, max MAX_CROWD (15)
  G.crowd = Math.max(1, Math.min(G.MAX_CROWD, Math.floor(G.crowd)));
  rebuildCrowd();
  spawnPfx(pos, type.color, 18, 6);
  showGateFlash(type.lbl, type.color);
  SFX.gate(type.op!=='sub');
}

// ════════════════════════════════════════════
// BATTLE STATE
// ════════════════════════════════════════════
function startBattle() {
  if(G.state==='battle') return;
  G.state='battle';
  G.battleTimer=0; G.lastHit=0; G.hitCount=0; G.bossKillTimer=0;
  G.bossDeathPlayed=false; G.fighterCooldowns=[]; G.hitPause=0;
  // Reset player HP for this battle
  G.playerHP = G.playerMaxHP = 100;
  if(G.boss) { G.boss.dead=false; G.boss.deathTimer=0; }

  document.getElementById('bossBar').style.display='block';
  document.getElementById('playerHpBar').style.display='block';
  document.getElementById('playerHpFill').style.width='100%';
  document.getElementById('swipeHint').style.display='none';
  document.getElementById('laneDots').style.display='none';
  document.getElementById('battleInfo').style.display='block';

  // Assign orbit slots
  G.crowdMeshes.forEach((cm,i)=>{ cm.orbitIdx=i; cm.orbitAngle=i/G.crowdMeshes.length*Math.PI*2; });

  // Cinematic intro — camera swoop
  const bz=G.boss.grp.position.z;
  G.cam.position.set(0,16,bz+25);
  G.cam.lookAt(0,4,bz);
}

function updateBattle(dt) {
  // ── HIT PAUSE: skip all logic during freeze frame ──
  if(G.hitPause > 0) {
    G.hitPause -= dt;
    return; // everything freezes for impact feel
  }

  G.battleTimer += dt;
  if(!G.boss) return;
  const bossPos = G.boss.grp.position;
  const bz      = bossPos.z;

  // ══════════════════════════════════════════
  // CAMERA — limited rotation, smooth lerp
  //   Max yaw: ±45° orbit, stays behind fight
  // ══════════════════════════════════════════
  const introT      = Math.min(1, G.battleTimer * 0.5);
  const maxOrbitYaw = Math.PI * 0.25;                    // 45° limit
  const orbitYaw    = Math.sin(G.battleTimer * 0.2) * maxOrbitYaw;
  const camDist     = introT < 1 ? 25 - introT*13 : 12 + Math.sin(G.battleTimer*.15)*2;
  const camH        = introT < 1 ? 16 - introT*7  :  9 + Math.sin(G.battleTimer*.2)*1.5;

  // Camera shake
  const shX = G.camShake > 0 ? (Math.random()-.5)*G.camShake*.5 : 0;
  const shY = G.camShake > 0 ? (Math.random()-.5)*G.camShake*.3 : 0;
  G.camShake = Math.max(0, G.camShake - dt*9);

  const tcx = bossPos.x + Math.sin(orbitYaw)*camDist;
  const tcz = bz        + Math.cos(orbitYaw)*camDist;
  const lsp = introT < 1 ? 2.5 : 3.5;
  G.cam.position.x += (tcx - G.cam.position.x)*lsp*dt + shX;
  G.cam.position.z += (tcz - G.cam.position.z)*lsp*dt;
  G.cam.position.y += (camH - G.cam.position.y)*lsp*dt + shY;
  G.cam.lookAt(bossPos.x, bossPos.y + 2.2*G.boss.s, bz);

  // ══════════════════════════════════════════
  // BOSS DEATH ANIMATION (after kill blow)
  // ══════════════════════════════════════════
  if(G.boss.dead) {
    G.boss.deathTimer = (G.boss.deathTimer||0) + dt;
    const dt2 = G.boss.deathTimer;
    G.boss.grp.rotation.x = Math.min(Math.PI*.5, dt2*2.5);   // fall back
    G.boss.grp.position.y = Math.max(-2, -dt2*dt2*3);         // sink
    G.boss.grp.position.z = bz + dt2*1.5;
    G.boss.grp.rotation.z = Math.sin(dt2*8)*Math.min(1,dt2)*.3; // spin
    if(dt2 > 1.8 && !G.bossDeathPlayed) {
      G.bossDeathPlayed = true;
      endLevel(true);
    }
    return;
  }

  // ══════════════════════════════════════════
  // FIGHTER AI — only MAX_ATTACKERS (2-3) fight at once
  //   Others circle nearby and wait their turn
  // ══════════════════════════════════════════
  while(G.fighterCooldowns.length < G.crowdMeshes.length) G.fighterCooldowns.push(Math.random()*1.5);

  // Count how many are currently attacking
  let activeAttackers = 0;
  G.crowdMeshes.forEach((cm, i) => {
    if(G.fighterCooldowns[i] <= 0) activeAttackers++;
  });

  let totalDmg = 0;

  G.crowdMeshes.forEach((cm, i) => {
    animAttack(cm, G.t, bossPos, dt);

    // Distance to boss
    const dx  = cm.grp.position.x - bossPos.x;
    const dz2 = cm.grp.position.z - bossPos.z;
    const dist = Math.sqrt(dx*dx + dz2*dz2);

    // Tick down cooldown
    if(G.fighterCooldowns[i] > 0) G.fighterCooldowns[i] -= dt;

    const atkRange = G.attackRange + (i%3)*.35;

    // Only attack if: in range, cooled down, and slot is available
    const canAttack = dist < atkRange
      && G.fighterCooldowns[i] <= 0
      && (activeAttackers < G.MAX_ATTACKERS || i < G.MAX_ATTACKERS);

    if(canAttack) {
      // Individual cooldown: 1.0–1.8s staggered (no spam)
      G.fighterCooldowns[i] = 1.0 + (i%4)*.2;
      activeAttackers = Math.max(activeAttackers, i+1);

      // Damage per hit: scales with level, one attacker at a time
      const dmg = Math.max(1, Math.floor(2 + G.level*.4));
      totalDmg += dmg;

      // Per-fighter hit particle
      const hitPt = bossPos.clone().add(new THREE.Vector3(
        (Math.random()-.5)*.8, 1.5+Math.random()*2*G.boss.s, 0
      ));
      spawnPfx(hitPt, 0xff4400, 5, 4);
      G.camShake = Math.max(G.camShake, 0.22);
    }
  });

  // ══════════════════════════════════════════
  // APPLY DAMAGE + HIT EFFECTS
  // ══════════════════════════════════════════
  if(totalDmg > 0) {
    G.bossHP = Math.max(0, G.bossHP - totalDmg);
    G.hitCount++;
    G.boss.shakeT = 0.1;

    // Boss HP bar
    const pct = G.bossHP / G.bossMaxHP;
    document.getElementById('bossBarFill').style.width  = (pct*100)+'%';
    document.getElementById('bossBarPct').textContent   = Math.ceil(pct*100)+'%';
    document.getElementById('bossBarFill').style.background =
      `linear-gradient(90deg,hsl(${Math.floor(pct*120)},90%,45%),hsl(${Math.min(Math.floor(pct*120)+30,60)},90%,55%))`;

    // Hit FX
    const hp2 = bossPos.clone().add(new THREE.Vector3((Math.random()-.5)*.6, 2.8*G.boss.s, 0));
    const sc  = w2s(hp2);

    // ── STYLIZED BLOOD SPLASH ──
    spawnBloodSplash(sc.x, sc.y, false);
    flashBoss();          // white flash on boss mesh
    spawnDust(bossPos.clone());
    SFX.hit();
    triggerHitPause(0.05); // tiny freeze: 50ms

    showDmgNum(sc.x, sc.y, totalDmg);
    showComboPopup(sc.x, sc.y, G.hitCount);

    // ── EVERY 5th HIT: BIG IMPACT ──
    if(G.hitCount % 5 === 0) {
      spawnStars(hp2);
      spawnShockwave(bossPos.clone());
      screenFlash();
      spawnBloodSplash(sc.x, sc.y, true); // large fiery splash
      G.camShake = Math.max(G.camShake, 1.1);
      triggerHitPause(0.09); // longer freeze on big hit
      SFX.bigHit();
    }

    // ── FINISHING BLOW ──
    if(G.bossHP <= 0 && !G.boss.dead) {
      triggerBossDeath();
      return;
    }
  }

  // ══════════════════════════════════════════
  // BOSS AI — attacks player, reduces player HP
  // ══════════════════════════════════════════
  const bossAtkInterval = Math.max(1.2, 3.0 - G.level*.12);
  if(G.battleTimer > 1.5 &&
     Math.floor(G.battleTimer/bossAtkInterval) > Math.floor((G.battleTimer-dt)/bossAtkInterval)) {

    // Boss hits 1 random front-row fighter (removes from crowd)
    if(G.crowd > 1 && Math.random() < 0.6) {
      G.crowd = Math.max(1, G.crowd - 1);
      rebuildCrowd();
      G.camShake = Math.max(G.camShake, 0.55);
      if(G.crowd === 1) {
        document.getElementById('progressFill').style.background = 'linear-gradient(90deg,#ff4444,#ff8800)';
      }
    }

    // Boss also damages player HP directly
    const bossDmg = Math.max(3, 5 + G.level*2);
    G.playerHP = Math.max(0, G.playerHP - bossDmg);
    const phpPct = G.playerHP / G.playerMaxHP;
    document.getElementById('playerHpFill').style.width = (phpPct*100)+'%';

    // Screen redden slightly when player is hurt
    if(phpPct < 0.4) screenFlash();
    SFX.hit();

    // Player death
    if(G.playerHP <= 0) { endLevel(false); return; }
  }

  // ── LOSS CONDITION (crowd wiped) ──
  if(G.crowd <= 1 && G.battleTimer > 8 && G.bossHP > G.bossMaxHP*.2) {
    endLevel(false);
  }
}

// ════════════════════════════════════════════
// BOSS DEATH / FINISHING ANIMATION
// ════════════════════════════════════════════
function triggerBossDeath() {
  if(G.boss.dead) return;
  G.boss.dead = true;
  G.boss.deathTimer = 0;
  G.boss.hp = 0;

  // Massive screen flash + camera shake on killing blow
  screenFlash();
  screenFlash(); // double flash for impact
  G.camShake = 2.0;
  SFX.bigHit();

  // Huge star burst at boss center
  const bp = G.boss.grp.position.clone();
  spawnStars(bp.clone().add(new THREE.Vector3(0, 3 * G.boss.s, 0)));
  spawnStars(bp.clone().add(new THREE.Vector3(-1, 2, 0)));
  spawnStars(bp.clone().add(new THREE.Vector3( 1, 2, 0)));
  spawnShockwave(bp.clone());
  spawnShockwave(bp.clone().add(new THREE.Vector3(0, 1, 0)));
  spawnPfx(bp.clone().add(new THREE.Vector3(0,2,0)), 0xffd600, 30, 8);
  spawnPfx(bp.clone().add(new THREE.Vector3(0,2,0)), 0xff4400, 20, 6);

  // Freeze boss ring
  G.boss.ring.material.opacity = 0;

  // HP bar goes to 0
  document.getElementById('bossBarFill').style.width = '0%';
  document.getElementById('bossBarPct').textContent = '0%';

  // Show FINISH! popup on screen
  const el = document.createElement('div');
  el.style.cssText = [
    'position:fixed','top:38%','left:50%','transform:translate(-50%,-50%)',
    'font-size:min(72px,18vw)','font-weight:900','color:#ffd600',
    'text-shadow:0 0 40px #ffd600, 0 0 80px #ff8800','pointer-events:none',
    'z-index:18','letter-spacing:-2px','animation:finishPop 1.4s forwards'
  ].join(';');
  el.textContent = 'K.O.!';
  if(!document.getElementById('finishPopStyle')) {
    const s = document.createElement('style');
    s.id = 'finishPopStyle';
    s.textContent = '@keyframes finishPop{0%{transform:translate(-50%,-50%) scale(0.1);opacity:1}40%{transform:translate(-50%,-50%) scale(1.3);opacity:1}70%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(1.2);opacity:0}}';
    document.head.appendChild(s);
  }
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1500);

  SFX.win(); // play win chime immediately
}

// ════════════════════════════════════════════
// END LEVEL
// ════════════════════════════════════════════
function endLevel(win) {
  if(G.state==='result') return;
  G.state='result';
  document.getElementById('bossBar').style.display='none';
  document.getElementById('playerHpBar').style.display='none';
  document.getElementById('battleInfo').style.display='none';
  document.getElementById('progressFill').style.background='linear-gradient(90deg,#00e676,#69ff47)';

  if(win){
    // Extra celebration if not already triggered by death anim
    if(G.boss && !G.boss.dead) {
      spawnStars(G.boss.grp.position.clone().add(new THREE.Vector3(0,4*G.boss.s,0)));
      spawnShockwave(G.boss.grp.position.clone());
    }
    if(G.boss) G.boss.grp.position.y = -50;
  } else {
    SFX.lose();
  }
  // Delay longer if boss death animation was playing (gives anim time)
  const delay = (win && G.boss && G.boss.dead) ? 1200 : 400;
  setTimeout(()=>showAd(()=>showResult(win)), delay);
}

function showResult(win) {
  const rs=document.getElementById('resultScreen');
  rs.classList.remove('hidden');
  document.getElementById('resEmoji').textContent=win?'🏆':'💀';
  document.getElementById('resTitle').textContent=win?'VICTORY!':'DEFEATED!';
  document.getElementById('resTitle').style.color=win?'#00e676':'#ff4444';
  document.getElementById('resMsg').textContent=win
    ?`Your crowd of ${G.crowd} obliterated the boss! 🎉`
    :`The boss overpowered you... collect more people! 💪`;
  document.getElementById('resCrowd').textContent=G.crowd;
  document.getElementById('resLevel').textContent=G.level;
  document.getElementById('resBoss').textContent=G.bossMaxHP;
  const btn=document.getElementById('btnNext');
  if(win){
    btn.textContent='NEXT LEVEL →';
    btn.className='btn-next win';
    btn.onclick=()=>{
      G.level++;
      G.crowd=Math.max(3,Math.floor(G.crowd*.5)+3);
      rs.classList.add('hidden');
      document.getElementById('levelNum').textContent=G.level;
      buildLevel(); rebuildCrowd();
      document.getElementById('swipeHint').style.display='flex';
      document.getElementById('laneDots').style.display='flex';
      // reset dots to center
      [0,1,2].forEach(i=>{ const d=document.getElementById('ldot'+i); if(d) d.classList.toggle('active',i===1); });
      G.state='running';
    };
  } else {
    btn.textContent='🔄 RETRY';
    btn.className='btn-next lose';
    btn.onclick=()=>{
      G.crowd=1; rs.classList.add('hidden');
      buildLevel(); rebuildCrowd();
      document.getElementById('swipeHint').style.display='flex';
      document.getElementById('laneDots').style.display='flex';
      [0,1,2].forEach(i=>{ const d=document.getElementById('ldot'+i); if(d) d.classList.toggle('active',i===1); });
      G.state='running';
    };
  }
}

// ════════════════════════════════════════════
// AD SYSTEM
// ════════════════════════════════════════════
function showAd(cb) {
  const ADS=[
    {ico:'🎮',title:'Super Battle Arena',desc:'#1 Battle Royale — Free!'},
    {ico:'💎',title:'Gem Rush',desc:'Build your empire today!'},
    {ico:'🏎️',title:'Turbo Racer',desc:'Race at 400km/h!'},
    {ico:'⚔️',title:'Knight Kingdom',desc:'Defend your castle!'},
  ];
  const a=ADS[G.level%ADS.length];
  document.getElementById('adIco').textContent=a.ico;
  document.getElementById('adTitle').textContent=a.title;
  document.getElementById('adDesc').textContent=a.desc;
  const adEl=document.getElementById('adScreen');
  adEl.classList.remove('hidden');
  let secs=5; document.getElementById('adSecs').textContent=secs;
  const iv=setInterval(()=>{
    secs--; document.getElementById('adSecs').textContent=secs;
    if(secs<=0){ clearInterval(iv); adEl.classList.add('hidden'); cb(); }
  },1000);
}

// ════════════════════════════════════════════
// HERO PREVIEW (start screen)
// ════════════════════════════════════════════
function buildHeroRow() {
  const row=document.getElementById('heroRow');
  const cs=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9f43'];
  cs.forEach((c,i)=>{
    const d=document.createElement('div'); d.className='mini-hero'; d.style.animationDelay=(i*.14)+'s';
    d.innerHTML=`<div style="width:15px;height:15px;border-radius:50%;background:${c};border:2px solid rgba(255,255,255,.6)"></div>
      <div style="width:3px;height:18px;background:${c};border-radius:2px"></div>
      <div style="display:flex;gap:2px"><div style="width:6px;height:12px;background:${c};border-radius:2px;transform:rotate(12deg)"></div>
      <div style="width:6px;height:12px;background:${c};border-radius:2px;transform:rotate(-12deg)"></div></div>`;
    row.appendChild(d);
  });
}

// ════════════════════════════════════════════
// MAIN LOOP
// ════════════════════════════════════════════
let _lt=0, _started=false;
function loop(now) {
  requestAnimationFrame(loop);
  if(!_started){ _lt=now; _started=true; }
  const dt=Math.min((now-_lt)/1000,.05); _lt=now;
  G.t+=dt;

  if(G.state==='running')   updateRunning(dt);
  else if(G.state==='battle') updateBattle(dt);

  updateParticles(dt);
  animBoss(dt);

  // Cloud drift
  G.scene.children.forEach(obj=>{
    if(obj.isGroup && obj.children.length>2 && obj.position.y>20){
      obj.position.x+=dt*.5;
      if(obj.position.x>135) obj.position.x=-135;
    }
  });

  if(G.composer) G.composer.render();
  else G.ren.render(G.scene, G.cam);
}

// ════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════
function startGame() {
  try {
    SFX.collect();
  } catch(e){}
  document.getElementById('startScreen').classList.add('hidden');
  G.state='running';
  updateCrowdUI();
}
document.getElementById('btnPlay').onclick=()=>{
  try {
    SFX.collect();
    document.getElementById('startScreen').classList.add('hidden');
    G.state='running';
    updateCrowdUI();
  } catch(err) {
    document.body.innerHTML += '<div style="position:fixed;top:0;left:0;right:0;background:red;color:#fff;padding:16px;z-index:9999;font-size:13px;word-break:break-all;">PLAY ERROR: '+err.message+'</div>';
  }
};

try {
  buildHeroRow();
  initThree();
  setupInput();
  buildLevel();
  rebuildCrowd();
  requestAnimationFrame(loop);
} catch(err) {
  document.body.innerHTML += '<div style="position:fixed;top:0;left:0;right:0;background:red;color:#fff;padding:16px;z-index:9999;font-size:13px;word-break:break-all;">BOOT ERROR: '+err.message+'\n'+err.stack+'</div>';
}
</script>
